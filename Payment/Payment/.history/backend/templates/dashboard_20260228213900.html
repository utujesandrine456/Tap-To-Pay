<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Nexus | Team Pixel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #cbd5e1; }
        .neon-border-cyan { box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.3); }
        .neon-border-indigo { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.4); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(34, 211, 238, 0.5); color: #22d3ee; }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .product-img { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div class="w-full bg-slate-900/50 border-b border-white/5 py-3 px-6 flex justify-between items-center backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-black tracking-tighter text-white">RFID<span class="neon-text-cyan italic">NEXUS</span></h1>
            <span class="text-[10px] mono text-slate-500 uppercase tracking-widest">Node: <span class="text-indigo-400">team_pixel</span></span>
        </div>
        <div class="flex items-center gap-3 bg-black/40 px-4 py-1 rounded-full border border-white/5">
            <span id="conn-status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
            <span id="conn-status-text" class="text-[10px] font-bold uppercase tracking-widest text-red-500">Offline</span>
        </div>
    </div>

    <main class="container mx-auto px-6 py-8 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="neon-border-indigo glass-dark p-8 rounded-[2rem] space-y-6">
                <div class="flex items-center gap-3 border-b border-white/5 pb-4">
                    <div class="p-2 bg-indigo-500/20 rounded-lg"><svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></div>
                    <h2 class="text-xl font-bold text-white">Admin: Top-Up</h2>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest">Card UID</label>
                        <p id="admin-uid" class="text-lg mono text-white truncate">--- --- ---</p>
                    </div>
                    <div>
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest">Prev Balance</label>
                        <p id="admin-prev-balance" class="text-lg mono text-cyan-400">0 RWF</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="number" id="topup-amount" placeholder="Amount to Add" class="w-full bg-black/40 border border-white/5 rounded-xl py-4 px-6 text-white focus:outline-none focus:border-indigo-500 font-bold">
                    <button onclick="handleTransaction('/topup', 'topup-amount', 'admin-uid')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black uppercase tracking-widest text-xs py-4 rounded-xl transition-all">
                        Execute Top-Up
                    </button>
                </div>
            </section>

            <section class="neon-border-cyan glass-dark p-8 rounded-[2rem] space-y-6">
                <div class="flex items-center gap-3 border-b border-white/5 pb-4">
                    <div class="p-2 bg-cyan-500/20 rounded-lg"><svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div>
                    <h2 class="text-xl font-bold text-white">Cashier: Payment</h2>
                </div>

                <div class="flex items-center gap-6 bg-white/5 p-4 rounded-2xl">
                    <img id="product-preview" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200" alt="Product" class="product-img">
                    <div class="flex-grow">
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest">Select Product</label>
                        <select id="product-select" onchange="updateTotal()" class="w-full bg-transparent text-white font-bold text-lg focus:outline-none cursor-pointer">
                            <option value="15000" data-img="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200">Headsets (Premium)</option>
                            <option value="25000" data-img="https://images.unsplash.com/photo-1588423770674-f2855ee47ba5?w=200">Apple AirPods</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest">Quantity</label>
                        <input type="number" id="pay-qty" value="1" min="1" oninput="updateTotal()" class="w-full bg-black/40 border border-white/5 rounded-xl p-2 text-white focus:border-cyan-500 text-center">
                    </div>
                    <div class="text-right">
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest">Total Cost</label>
                        <p id="total-cost-display" class="text-2xl font-black text-white neon-text-cyan">15000</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-4">
                    <div>
                        <p class="text-[10px] mono text-slate-500">CASHIER UID</p>
                        <p id="pay-uid" class="text-xs mono text-white">--- --- ---</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] mono text-slate-500">BAL</p>
                        <p id="pay-prev-balance" class="text-xs mono text-white">0 RWF</p>
                    </div>
                </div>

                <button onclick="handleTransaction('/pay', 'total-cost-display', 'pay-uid')" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black uppercase tracking-widest text-xs py-4 rounded-xl transition-all">
                    Confirm Purchase
                </button>
            </section>
        </div>

        <div class="mt-8 neon-border-cyan glass-dark rounded-2xl p-6 bg-black/20">
            <h3 class="text-[10px] font-bold text-cyan-500/80 uppercase tracking-widest mb-4">Transaction_Ledger.db</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left mono text-[11px]">
                    <thead class="text-slate-500 border-b border-white/5">
                        <tr>
                            <th class="pb-2">TIME</th>
                            <th class="pb-2">TYPE</th>
                            <th class="pb-2">UID</th>
                            <th class="pb-2 text-right">AMOUNT</th>
                            <th class="pb-2 text-right">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const socket = io(`http://${window.location.hostname}:5001`);
        
        // Auto-update total and image when product changes
        function updateTotal() {
            const select = document.getElementById('product-select');
            const price = select.value;
            const qty = document.getElementById('pay-qty').value;
            const img = select.options[select.selectedIndex].getAttribute('data-img');
            
            document.getElementById('total-cost-display').innerText = price * qty;
            document.getElementById('product-preview').src = img;
        }

        // Real-time WebSocket Updates
        socket.on('update_ui', (data) => {
            // Auto-fill UID and Balance on BOTH interfaces when card is scanned
            document.getElementById('admin-uid').innerText = data.uid;
            document.getElementById('pay-uid').innerText = data.uid;
            document.getElementById('admin-prev-balance').innerText = data.balance + " RWF";
            document.getElementById('pay-prev-balance').innerText = data.balance + " RWF";

            if (data.type === 'TOP-UP' || data.type === 'PAYMENT') {
                addToLedger(data);
            }
        });

        // HTTP POST Handler
        async function handleTransaction(endpoint, inputId, uidId) {
            const uid = document.getElementById(uidId).innerText;
            const amountVal = document.getElementById(inputId).innerText || document.getElementById(inputId).value;
            
            if (uid === "--- --- ---" || !amountVal) {
                alert("Please scan a card first.");
                return;
            }

            try {
                const response = await fetch(`http://${window.location.hostname}:5001${endpoint}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ uid: uid, amount: parseInt(amountVal) })
                });
                
                const res = await response.json();
                if (response.ok) {
                    alert(`Transaction Approved! New Balance: ${res.new_balance}`);
                } else {
                    alert(`Declined: ${res.error}`);
                }
            } catch (err) {
                alert("Backend Connection Error");
            }
        }

        function addToLedger(data) {
            const row = document.createElement('tr');
            row.className = "border-b border-white/5 " + (data.type === 'TOP-UP' ? "text-indigo-300" : "text-cyan-300");
            row.innerHTML = `
                <td class="py-3 opacity-50">${data.time || 'now'}</td>
                <td class="py-3 font-bold">${data.type}</td>
                <td class="py-3">${data.uid}</td>
                <td class="py-3 text-right">${data.type === 'TOP-UP' ? '+' : '-'}${data.amount}</td>
                <td class="py-3 text-right">SUCCESS</td>
            `;
            document.getElementById('ledger-body').prepend(row);
        }

        socket.on('connect', () => {
            document.getElementById('conn-status-dot').className = "w-2 h-2 bg-cyan-400 rounded-full";
            document.getElementById('conn-status-text').innerText = "System Live";
            document.getElementById('conn-status-text').className = "text-[10px] font-bold text-cyan-400";
        });
    </script>
</body>
</html>
